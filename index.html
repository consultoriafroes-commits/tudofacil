<!DOCTYPE html>

<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tudo Fácil - Prefeitura de Vitória da Conquista</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Roboto, Arial, sans-serif;
background:#f2f4f8;
display:flex;
flex-direction:column;
height:100vh;
}

/* CABEÇALHO */

.header{
background:#1a4b8e;
color:white;
display:flex;
align-items:center;
gap:15px;
padding:15px;
}

.logo{
height:60px;
}

.titulo{
font-size:22px;
font-weight:700;
line-height:1.2;
}

/* PDF */

.viewer{
flex:1;
width:100%;
}

iframe{
width:100%;
height:100%;
border:none;
}

/* CELULAR */

@media (max-width:600px){

.header{
flex-direction:column;
text-align:center;
}

.logo{
height:50px;
}

.titulo{
font-size:18px;
}

}

</style>

</head>

<body>

<div class="header">

<img src="marca.png" class="logo">

<div class="titulo">
TUDO FÁCIL<br>
Prefeitura Municipal de Vitória da Conquista
</div>

</div>

<div class="viewer">
<iframe src="processo10445.pdf"></iframe>
</div>

</body>

</html>
